<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vopik_ Portfolio</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

body {
    margin: 0;
    font-family: Inter, sans-serif;
    background: #000;
    color: white;
}

/* hvězdy */
body::before {
    content: "";
    position: fixed;
    width: 200%;
    height: 200%;
    background: radial-gradient(white 1px, transparent 1px);
    background-size: 50px 50px;
    opacity: 0.05;
    animation: move 60s linear infinite;
}

@keyframes move {
    from {transform: translate(0,0);}
    to {transform: translate(-200px,-200px);}
}

/* HEADER */
header {
    text-align: center;
    padding: 50px 20px 10px;
}

h1 {
    font-size: 55px;
    margin: 0;
}

/* NAV */
nav {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-top: 20px;
}

button {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2);
    color: white;
    padding: 10px 15px;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    border-color: white;
}

/* SECTIONS */
.section {
    display: none;
    width: 80%;
    margin: auto;
    margin-top: 20px;
}

.section.active {
    display: block;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    padding: 20px;
    margin: 20px 0;
    border-radius: 15px;
}

/* HEAD */
.head {
    display: block;
    margin: auto;
    width: 120px;
}

/* PLAYERS */
.players {
    display: flex;
    justify-content: center;
    gap: 30px;
}

.player {
    text-align: center;
}

.player img {
    width: 80px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.2);
}

/* footer */
footer {
    text-align: center;
    opacity: 0.4;
    padding: 30px;
}
</style>
</head>

<body>

<header>
    <h1>Vopik_</h1>

    <nav>
        <button onclick="show('about')">O mně</button>
        <button onclick="show('servers')">Servery</button>
        <button onclick="show('contact')">Kontakt</button>
    </nav>
</header>

<!-- ABOUT -->
<div id="about" class="section active">

    <div class="card">
        <h2>👤 O mně</h2>
        <img class="head" src="https://mc-heads.net/avatar/Vopik_" />
        <p style="text-align:center;opacity:0.7">
            Minecraft Developer • Discord Admin
        </p>
    </div>

    <div class="card">
        <h2>🤝 Spolupracovníci</h2>

        <div class="players">
            <div class="player">
                <img src="https://mc-heads.net/avatar/matty_ytb">
                <p>matty_ytb</p>
            </div>

            <div class="player">
                <img src="https://mc-heads.net/avatar/idlk_xddd">
                <p>idlk_xddd</p>
            </div>
        </div>

    </div>

</div>

<!-- SERVERS -->
<div id="servers" class="section">

    <div class="card">
        <h2>🌐 Servery</h2>
        <p>Sem můžeš později přidat svoje Minecraft servery.</p>
        <p style="opacity:0.6">Např. IP, status, verze, pluginy...</p>
    </div>

</div>

<!-- CONTACT -->
<div id="contact" class="section">

    <div class="card">
        <h2>📩 Kontakt</h2>
        <p>Discord: <b>vopik_</b></p>
        <p>Email: <b>vopik@email.com</b></p>
    </div>

</div>

<footer>
    © 2026 Vopik_
</footer>

<script>
function show(id){
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}
</script>

</body>
</html>
